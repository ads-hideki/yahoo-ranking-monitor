name: Yahoo ranking monitor

# 1日2回＋手動実行。Yahooのデイリーランキングは概ね 8時頃/20時頃 に更新されるため、
# その少し後（JST 08:30 / 20:30）に取得する。
# GitHub Actions の cron は UTC 指定のため 9時間引く。
#   JST 08:30 = UTC 23:30（前日） / JST 20:30 = UTC 11:30
# ※GitHubのcronは混雑時に数分〜遅延することがある（仕様）。少し余裕を持たせている。
on:
  schedule:
    - cron: "30 23 * * *"   # JST 08:30
    - cron: "30 11 * * *"   # JST 20:30
  workflow_dispatch:        # 手動実行ボタン

# 結果（スクショ・履歴）をリポジトリにコミットするための書き込み権限
permissions:
  contents: write

concurrency:
  group: ranking-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        run: python monitor.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data screenshots
          if git diff --cached --quiet; then
            echo "変更なし（コミットするものがありません）"
          else
            git commit -m "ranking update: $(date -u +'%Y-%m-%d %H:%MUTC')"
            git push
          fi
