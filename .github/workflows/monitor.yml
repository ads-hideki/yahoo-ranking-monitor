name: Yahoo ranking monitor

# デイリー=1日1回（全取得）／リアルタイム=2時間おき。
# デイリーランキングは実質1日1回更新のため取得は1日1回、リアルタイムは変動が速いので2時間おき。
# GitHub Actions の cron は UTC 指定（JST−9時間）。
#   ・"30 23 * * *"  = JST 08:30 … デイリー＋リアルタイムを全取得（1日1回）
#   ・"0 */2 * * *"  = 2時間おき   … リアルタイムのみ取得
# ※GitHubのcronは混雑時に数分〜遅延することがある（仕様）。
on:
  schedule:
    - cron: "30 23 * * *"   # JST 08:30 … 全取得（デイリー+リアルタイム）
    - cron: "0 */2 * * *"   # 2時間おき … リアルタイムのみ
  workflow_dispatch:        # 手動実行（全取得）

# 結果（スクショ・履歴）をリポジトリにコミットするための書き込み権限
permissions:
  contents: write

concurrency:
  group: ranking-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        run: |
          if [ "${{ github.event.schedule }}" = "0 */2 * * *" ]; then
            python monitor.py --only realtime   # 2時間おき：リアルタイムのみ
          else
            python monitor.py                   # 1日1回/手動：全取得
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data screenshots index.html
          if git diff --cached --quiet; then
            echo "変更なし（コミットするものがありません）"
          else
            git commit -m "ranking update: $(date -u +'%Y-%m-%d %H:%MUTC')"
            git pull --rebase origin main || true
            git push
          fi
